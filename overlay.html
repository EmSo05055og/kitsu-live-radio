<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Kitsu Radio – OBS Overlay</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&display=swap" rel="stylesheet"/>
  <style>
    /* ── Chroma-Key Hintergrund ── */
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #00ff00;      /* OBS Chroma-Key grün */
      font-family: 'Space Mono', monospace;
      width: 100vw;
      height: 100vh;
      display: flex;
      align-items: center;
      overflow: hidden;
    }

    /* ── Gesamter Widget-Block ── */
    .widget {
      display: flex;
      align-items: center;
      gap: 18px;
      padding: 14px 22px;
      /* halbtransparenter dunkler Hintergrund – für OBS ohne Chroma entfernbar */
      background: rgba(10, 10, 26, 0.72);
      border-radius: 18px;
      border: 2px solid rgba(0, 212, 255, 0.6);
      box-shadow: 0 0 30px rgba(0, 212, 255, 0.3);
      max-width: 560px;
      margin: 0 auto;
    }

    /* ── Drehendes rundes Album-Icon ── */
    .icon-ring {
      flex-shrink: 0;
      width: 80px;
      height: 80px;
      border-radius: 50%;
      border: 3px solid rgba(0, 212, 255, 0.8);
      box-shadow: 0 0 15px rgba(0, 212, 255, 0.5);
      overflow: hidden;
      animation: spinIcon 8s linear infinite;
    }

    .icon-ring img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      border-radius: 50%;
    }

    @keyframes spinIcon {
      from { transform: rotate(0deg); }
      to   { transform: rotate(360deg); }
    }

    /* ── Textbereich ── */
    .info {
      display: flex;
      flex-direction: column;
      gap: 5px;
      min-width: 0;
    }

    .station-name {
      font-size: 15px;
      font-weight: 700;
      color: #00d4ff;
      text-transform: uppercase;
      letter-spacing: 3px;
      text-shadow: 0 0 10px rgba(0, 212, 255, 0.8);
      white-space: nowrap;
    }

    .song-title {
      font-size: 14px;
      font-weight: 700;
      color: #ffffff;
      text-shadow: 0 0 6px rgba(255,255,255,0.4);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 340px;
    }

    .song-artist {
      font-size: 11px;
      color: rgba(255,255,255,0.6);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 340px;
    }

    /* ── Fortschrittsbalken ── */
    .progress-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-top: 4px;
    }

    .time {
      font-size: 10px;
      color: rgba(0, 212, 255, 0.9);
      white-space: nowrap;
    }

    .bar-track {
      flex: 1;
      height: 4px;
      background: rgba(255,255,255,0.15);
      border-radius: 2px;
      overflow: hidden;
    }

    .bar-fill {
      height: 100%;
      background: linear-gradient(90deg, #00d4ff, #b537f2);
      border-radius: 2px;
      width: 0%;
      transition: width 0.8s linear;
    }

    /* ── Pulsierende Welle (live-Indikator) ── */
    .live-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #ff2d55;
      animation: livePulse 1s ease-in-out infinite;
      flex-shrink: 0;
    }

    @keyframes livePulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50%       { opacity: 0.4; transform: scale(0.7); }
    }
  </style>
</head>
<body>
  <div class="widget">
    <div class="icon-ring">
      <img id="albumArt" src="" alt="Album Art"/>
    </div>
    <div class="info">
      <div class="station-name">🦊 Kitsu Radio</div>
      <div class="song-title" id="songTitle">Lade…</div>
      <div class="song-artist" id="songArtist"></div>
      <div class="progress-row">
        <div class="live-dot"></div>
        <span class="time" id="curTime">0:00</span>
        <div class="bar-track"><div class="bar-fill" id="barFill"></div></div>
        <span class="time" id="durTime">0:00</span>
      </div>
    </div>
  </div>

  <script>
    const albumArt  = document.getElementById('albumArt');
    const songTitle = document.getElementById('songTitle');
    const songArtist= document.getElementById('songArtist');
    const curTime   = document.getElementById('curTime');
    const durTime   = document.getElementById('durTime');
    const barFill   = document.getElementById('barFill');

    let currentSong = null;
    let localOffset = 0;   // Sekunden seit Sync
    let syncTime    = 0;   // server-Startzeit in s
    let duration    = 0;
    let rafId       = null;

    const fmt = s => {
      const m = Math.floor(s / 60);
      const sec = Math.floor(s % 60);
      return `${m}:${sec.toString().padStart(2,'0')}`;
    };

    const tick = () => {
      if (!duration) { rafId = requestAnimationFrame(tick); return; }
      const elapsed = syncTime + (Date.now() / 1000 - localOffset);
      const clamped = Math.min(elapsed, duration);
      curTime.textContent = fmt(clamped);
      barFill.style.width = `${(clamped / duration * 100).toFixed(1)}%`;
      rafId = requestAnimationFrame(tick);
    };

    const updateUI = (song) => {
      if (!song) return;
      const changed = !currentSong || currentSong.name !== song.name;
      currentSong = song;

      if (changed) {
        songTitle.textContent  = song.name  || 'Unbekannter Song';
        songArtist.textContent = song.artist || '';
        if (song.icon) {
          albumArt.src = song.icon;
        } else {
          albumArt.src = '';
        }
      }

      // Fortschritt synchronisieren
      duration      = song.duration || 0;
      syncTime      = song.currentTime || 0;
      localOffset   = Date.now() / 1000;
      durTime.textContent = fmt(duration);
    };

    const poll = async () => {
      try {
        const res  = await fetch('/api/current-song', { cache: 'no-store' });
        if (res.ok) {
          const data = await res.json();
          updateUI(data);
        }
      } catch (_) { /* Server nicht erreichbar */ }
    };

    // Starten
    poll();
    setInterval(poll, 4000);
    rafId = requestAnimationFrame(tick);
  </script>
</body>
</html>
